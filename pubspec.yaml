name: my_bottom_nav_bar
description: "Goodbye to the traditional BottomNavBar."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # ? liquid glass
  liquid_glass_renderer: ^0.2.0-dev.4
  # ? state management
  flutter_bloc: ^9.1.1
